name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run Tests
        run: uv run pytest

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Need the tagged commit's full message for release notes;
          # default shallow clone strips the body.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Extract release notes from tag commit
        # Release notes = body of the tagged release-prep commit, minus the
        # Co-Authored-By trailer. Lets the commit message drive the release
        # description instead of GitHub's auto-generated PR/commit list.
        run: |
          git log -1 --pretty=%b "$GITHUB_REF_NAME" \
            | sed '/^Co-Authored-By:/d' > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          body_path: release-notes.md

  build-windows:
    runs-on: windows-latest
    needs: release
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build EXEs with PyInstaller
        run: uv run pyinstaller --onefile --name dw-client src/docuware/cli/dw.py

      - name: Upload Error Logs (if failed to build)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-logs
          path: build/*/warn-*.txt

      - name: Upload EXEs to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dw-client.exe
